document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"grid-template-columns: 1fr 1.7fr 1fr\"] { grid-template-columns: 1fr !important; }\n  /* rodapé -> 2 colunas */\n  [style*=\"1.8fr 1fr 1fr 1fr 1fr\"] { grid-template-columns: 1fr 1fr !important; gap: 28px 24px !important; }\n\n  /* respiro lateral mais justo */\n  section { padding-left: 20px !important; padding-right: 20px !important; }\n  footer  { padding-left: 24px !important; padding-right: 24px !important; }\n\n  /* topos de hero muito altos (atrás do nav fixo) */\n  [style*=\"padding: 160px\"] { padding-top: 108px !important; padding-bottom: 56px !important; }\n  [style*=\"padding: 150px\"] { padding-top: 104px !important; }\n\n  /* paddings internos grandes de cards/CTAs */\n  [style*=\"padding: 64px 56px\"] { padding: 36px 24px !important; }\n  [style*=\"padding: 52px 48px\"] { padding: 32px 22px !important; }\n  [style*=\"padding: 48px 48px\"] { padding: 28px 22px !important; }\n\n  /* fotos de time com altura fixa -> menores */\n  [style*=\"clamp(340px, 38vw, 500px)\"] { height: 230px !important; }\n\n  /* CTA final da home: empilha e alinha à esquerda */\n  .home-cta-card { grid-template-columns: 1fr !important; gap: 28px !important; padding: 40px 26px !important; }\n  .home-cta-card [style*=\"flex-direction:column\"],\n  .home-cta-card [style*=\"flex-direction: column\"] { align-items: stretch !important; }\n  .home-cta-card button { width: 100% !important; text-align: center !important; }\n}\n\n/* ---------- Celular pequeno ---------- */\n@media (max-width: 420px) {\n  [style*=\"1.8fr 1fr 1fr 1fr 1fr\"] { grid-template-columns: 1fr !important; }\n}\n<\u002Fstyle>\n  <style>\n    body { margin:0; background:#0A0A0C; -webkit-font-smoothing:antialiased; }\n    @keyframes summitPulse { 0%,100% { opacity:0.55; transform:scale(1); } 50% { opacity:1; transform:scale(1.3); } }\n    @media (max-width: 1024px) {\n      .summit-agenda-grid { grid-template-columns: repeat(2, 1fr) !important; }\n    }\n    @media (max-width: 900px) {\n      .summit-grid { grid-te );font-weight:700;color:#F0EFEB;\">Arvo<\u002Fspan>\n        <span style=\"display:block;font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:500;font-size:clamp(58px,8.4vw,112px);color:#EDE7DA;margin-top:-0.04em;\">Summit<\u002Fspan>\n      <\u002Fh1>\n      <div class=\"summit-tagline\" style=\"display:flex;align-items:flex-start;gap:12px;margin-top:26px;max-width:440px;\">\n        <span style=\"width:9px;height:9px;border-radius:50%;background:#FF4A2E;flex-shrink:0;margin-top:8px;\"><\u002Fspan>\n        <p style=\"font-size:clamp(15px,1.7vw,18px);font-weight:600;letter-spacing:0.02em;text-transform:uppercase;color:rgba(240,239,235,0.9);line-height:1.4;margin:0;\">Como a IA redefine os ganhos de eficiência em saúde<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"summit-meta\" style=\"display:flex;gap:clamp(28px,4vw,56px);margin-top:44px;flex-wrap:wrap;\">\n        <div>\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(240,239,235,0.45);margin-bottom:10px;\">Quando<\u002Fdiv>\n          <div style=\"font-size:clamp(24px,2.6vw,32px);font-weight:700;color:#F0EFEB;letter-spacing:-0.02em;line-height:1;\">20 <span style=\"font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:500;\">de agosto<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;letter-spacing:0.06em;color:rgba(240,239,235,0.55);margin-top:8px;\">Quinta-feira · 2026<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;background:rgba(240,239,235,0.14);align-self:stretch;\"><\u002Fdiv>\n        <div>\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(240,239,235,0.45);margin-bottom:10px;\">Onde<\u002Fdiv>\n          <div style=\"font-size:clamp(24px,2.6vw,32px);font-weight:700;color:#F0EFEB;letter-spacing:-0.02em;line-height:1.05;\">Pocket House<\u002Fdiv>\n          <div style=\"font-size:13px;letter-spacing:0.02em;color:rgba(240,239,235,0.55);margin-top:8px;line-height:1.5;\">Av. Prof. Fonseca Rodrigues, 689<br>Alto de Pinheiros, São Paulo · SP<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"summit-right\">\n      <div style=\"background:rgba(20,20,24,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(240,239,235,0.13);border-radius:22px;padding:clamp(28px,3vw,40px);box-shadow:0 40px 110px rgba(0,0,0,0.55);\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#FF4A2E;margin-bottom:6px;\">Garanta seu lugar<\u002Fdiv>\n        <div style=\"font-size:23px;font-weight:700;color:#F0EFEB;letter-spacing:-0.02em;margin-bottom:6px;\">Confirmar presença<\u002Fdiv>\n        <p style=\"font-size:14px;color:rgba(240,239,235,0.55);line-height:1.5;margin:0 0 22px;\">Vagas limitadas. Preencha os dados para garantir seu lugar — enviaremos os detalhes finais por e-mail.<\u002Fp>\n        <div id=\"hs-form-container\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n\n  <section style=\"position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:20px clamp(24px,5vw,64px) 100px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:34px;flex-wrap:wrap;\">\n      <div>\n        <span style=\"display:inline-block;font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#902B29;margin-bottom:14px;\">Prévia da agenda<\u002Fspan>\n        <h2 style=\"font-size:clamp(28px,3.6vw,44px);font-weight:700;letter-spacing:-0.03em;line-height:1.08;color:#F0EFEB;margin:0;\">Uma imersão em <em style=\"font-style:italic;font-family:'Playfair Display',Georgia,serif;color:#E5C8C5;font-weight:400;\">eficiência em saúde.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,74,46,0.35);background:rgba(144,43,41,0.14);border-radius:100px;padding:10px 18px;\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#FF4A2E;animation:summitPulse 1.6s infinite;\"><\u002Fspan>\n        <span style=\"font-size:13px;font-weight:600;color:#E5C8C5;\">Programação completa em breve<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"summit-ans\" style=\"display:flex;align-items:center;gap:22px;background:linear-gradient(105deg, rgba(144,43,41,0.28), rgba(144,43,41,0.08));border:1px solid rgba(255,74,46,0.3);border-radius:18px;padding:26px 30px;margin-bottom:16px;\">\n      <span style=\"flex-shrink:0;width:46px;height:46px;border-radius:50%;background:rgba(255,74,46,0.16);border:1px solid rgba(255,74,46,0.4);display:flex;align-items:center;justify-content:center;font-size:22px;\">★<\u002Fspan>\n      <div>\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#FF4A2E;margin-bottom:6px;\">Presença confirmada<\u002Fdiv>\n        <div style=\"font-size:clamp(17px,2vw,21px);font-weight:600;color:#F0EFEB;letter-spacing:-0.01em;line-height:1.35;\">Com a participação do Presidente da ANS — Agência Nacional de Saúde Suplementar<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"summit-agenda-grid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n      <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(240,239,235,0.1);border-radius:18px;padding:30px 28px;\">\n        <div style=\"font-size:13px;font-weight:700;color:#FF4A2E;letter-spacing:0.04em;margin-bottom:16px;\">Conteúdo<\u002Fdiv>\n        <div style=\"font-size:19px;font-weight:600;color:#F0EFEB;letter-spacing:-0.01em;line-height:1.25;margin-bottom:10px;\">Keynote de abertura<\u002Fdiv>\n        <p style=\"font-size:14px;color:rgba(240,239,235,0.55);line-height:1.6;margin:0;\">O cenário da saúde suplementar e o papel da IA na próxima década de eficiência.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(240,239,235,0.1);border-radius:18px;padding:30px 28px;\">\n        <div style=\"font-size:13px;font-weight:700;color:#FF4A2E;letter-spacing:0.04em;margin-bottom:16px;\">Conteúdo<\u002Fdiv>\n        <div style=\"font-size:19px;font-weight:600;color:#F0EFEB;letter-spacing:-0.01em;line-height:1.25;margin-bottom:10px;\">Painéis com operadoras<\u002Fdiv>\n        <p style=\"font-size:14px;color:rgba(240,239,235,0.55);line-height:1.6;margin:0;\">Líderes do setor compartilham resultados reais de integridade de pagamentos.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(240,239,235,0.1);border-radius:18px;padding:30px 28px;\">\n        <div style=\"font-size:13px;font-weight:700;color:#FF4A2E;letter-spacing:0.04em;margin-bottom:16px;\">Conexões<\u002Fdiv>\n        <div style=\"font-size:19px;font-weight:600;color:#F0EFEB;letter-spacing:-0.01em;line-height:1.25;margin-bottom:10px;\">Networking<\u002Fdiv>\n        <p style=\"font-size:14px;color:rgba(240,239,235,0.55);line-height:1.6;margin:0;\">Conexões entre operadoras, especialistas e o time Arvo para fechar o dia.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:13px;color:rgba(240,239,235,0.4);line-height:1.6;margin:24px 0 0;max-width:640px;\">Esta é uma prévia dos temas. A agenda completa, com horários e palestrantes, será liberada em breve para quem confirmar presença.<\u002Fp>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() { this.loadScript(); }\n  loadScript() {\n    if (window.hbspt) { this.makeForm(); return; }\n    if (!document.getElementById('hs-embed-v2')) {\n      const s = document.createElement('script');\n      s.id = 'hs-embed-v2';\n      s.src = 'https://js.hsforms.net/forms/embed/v2.js';\n      s.charset = 'utf-8';\n      s.onload = () => this.makeForm
